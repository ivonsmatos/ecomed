name: Deploy App — VPS

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "!app/**/*.md"
      - ".github/workflows/deploy-app.yml"

jobs:
  build-push:
    name: Build → GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ecomed
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build e push para GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache entre runs — reduz build de ~4min para ~1min
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_URL=${{ secrets.AUTH_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 8m
          envs: GHCR_TOKEN,GH_ACTOR
          script: |
            set -e

            IMAGE="ghcr.io/$GH_ACTOR/ecomed:latest"

            echo "🔐 Autenticando no GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "📦 Baixando nova imagem: $IMAGE"
            docker pull "$IMAGE"

            echo "🔄 Substituindo container..."
            docker stop ecomed-web 2>/dev/null || true
            docker rm   ecomed-web 2>/dev/null || true

            docker run -d \
              --name ecomed-web \
              --restart unless-stopped \
              -p 3010:3010 \
              --env-file /opt/ecomed/.env \
              "$IMAGE"

            echo "✅ Deploy concluído — status:"
            docker ps --filter name=ecomed-web --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.repository_owner }}
