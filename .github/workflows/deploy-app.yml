name: Deploy App - VPS

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build e Deploy no VPS
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 22m
          script: |
            set -euo pipefail

            APP_DIR="/opt/ecomed/app"
            CANARY_PORT="3011"
            PROD_PORT="3010"
            CANARY_NAME="ecomed-web-canary"

            cd "$APP_DIR"

            echo "Atualizando código"
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            echo "HEAD: $(git rev-parse --short HEAD)"

            echo "Carregando variáveis do servidor"
            source /opt/ecomed/.env

            echo "Build da imagem"
            docker build \
              --build-arg "DATABASE_URL=${DATABASE_URL}" \
              --build-arg "AUTH_SECRET=${AUTH_SECRET}" \
              --build-arg "AUTH_URL=${AUTH_URL}" \
              --build-arg "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
              --build-arg "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
              --build-arg "NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}" \
              --build-arg "NEXT_PUBLIC_SANITY_PROJECT_ID=${NEXT_PUBLIC_SANITY_PROJECT_ID:-q9uk6qff}" \
              --build-arg "NEXT_PUBLIC_SANITY_DATASET=${NEXT_PUBLIC_SANITY_DATASET:-production}" \
              -t ecomed-app:latest .

            echo "Subindo canário"
            docker rm -f "$CANARY_NAME" 2>/dev/null || true
            docker run -d \
              --name "$CANARY_NAME" \
              --restart unless-stopped \
              -p ${CANARY_PORT}:3010 \
              --env-file /opt/ecomed/.env \
              ecomed-app:latest

            echo "Health-check canário"
            ok=0
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${CANARY_PORT}/api/health" | grep -q '"status":"ok"'; then
                ok=1
                break
              fi
              sleep 2
            done

            if [ "$ok" -ne 1 ]; then
              echo "Canário não ficou saudável"
              docker logs --tail 120 "$CANARY_NAME" || true
              docker rm -f "$CANARY_NAME" || true
              exit 1
            fi

            echo "Swap para produção"
            docker rm -f ecomed-web 2>/dev/null || true
            docker run -d \
              --name ecomed-web \
              --restart unless-stopped \
              -p ${PROD_PORT}:3010 \
              --env-file /opt/ecomed/.env \
              ecomed-app:latest

            echo "Limpando canário"
            docker rm -f "$CANARY_NAME" 2>/dev/null || true

            echo "Health-check produção"
            curl -fsS "http://127.0.0.1:${PROD_PORT}/api/health" >/dev/null

            echo "Prune de imagens antigas"
            docker image prune -f --filter "until=168h" || true

            echo "Deploy concluído"
            docker ps --filter name=ecomed-web --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
