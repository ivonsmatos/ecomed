name: Deploy EcoMed

# Dispara em cada push para master que altere código do app
on:
  push:
    branches: [master]
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Build & Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 18m
          script: |
            set -e
            cd /opt/ecomed/app

            echo "📥 Atualizando código..."
            git pull origin master

            source /opt/ecomed/.env

            echo "🗃️  Aplicando migrações Prisma (prisma migrate deploy)..."
            # Usa DIRECT_URL para DDL (pgbouncer-friendly); fallback p/ DATABASE_URL
            MIGRATION_URL="${DIRECT_URL:-$DATABASE_URL}"
            docker run --rm \
              -v "$(pwd)/prisma":/work/prisma:ro \
              -w /work \
              -e DATABASE_URL="${MIGRATION_URL}" \
              node:20-alpine sh -c "apk add --no-cache openssl >/dev/null 2>&1 && npx --yes prisma@7.6.0 migrate deploy --schema=/work/prisma/schema.prisma"

            echo "♻️  Sincronizando scripts de manutenção..."
            mkdir -p /opt/ecomed/scripts/maintenance
            install -m 0755 ops/maintenance/healthcheck.sh   /opt/ecomed/scripts/maintenance/healthcheck.sh
            install -m 0755 ops/maintenance/cron-missoes.sh  /opt/ecomed/scripts/maintenance/cron-missoes.sh

            # Garante crons (idempotentes)
            current_cron=$(crontab -l 2>/dev/null || true)
            new_cron="$current_cron"
            if ! echo "$current_cron" | grep -q '/opt/ecomed/scripts/maintenance/healthcheck.sh'; then
              new_cron="$new_cron"$'\n'"*/2 * * * * /opt/ecomed/scripts/maintenance/healthcheck.sh"
              echo "✅ Cron healthcheck adicionado"
            fi
            if ! echo "$current_cron" | grep -q 'cron-missoes.sh reset'; then
              new_cron="$new_cron"$'\n'"0 3 * * * /opt/ecomed/scripts/maintenance/cron-missoes.sh reset"
              echo "✅ Cron reset-missoes adicionado"
            fi
            if ! echo "$current_cron" | grep -q 'cron-missoes.sh ensure'; then
              new_cron="$new_cron"$'\n'"15 3 * * * /opt/ecomed/scripts/maintenance/cron-missoes.sh ensure"
              echo "✅ Cron ensure-missoes adicionado"
            fi
            if [ "$new_cron" != "$current_cron" ]; then
              printf '%s\n' "$new_cron" | sed '/^$/d' | crontab -
            fi

            echo "🔨 Build Docker (com cache de camadas)..."
            docker build \
              --build-arg "DATABASE_URL=${DATABASE_URL}" \
              --build-arg "AUTH_SECRET=${AUTH_SECRET}" \
              --build-arg "AUTH_URL=${NEXTAUTH_URL}" \
              --build-arg "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
              --build-arg "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
              --build-arg "NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}" \
              --build-arg "NEXT_PUBLIC_SANITY_PROJECT_ID=${NEXT_PUBLIC_SANITY_PROJECT_ID:-q9uk6qff}" \
              --build-arg "NEXT_PUBLIC_SANITY_DATASET=${NEXT_PUBLIC_SANITY_DATASET:-production}" \
              -t ecomed-app:latest .

            echo "🔄 Reiniciando container ecomed-web..."
            docker stop ecomed-web 2>/dev/null || true
            docker rm   ecomed-web 2>/dev/null || true
            docker run -d \
              --name ecomed-web \
              --restart unless-stopped \
              --network ia_default \
              -p 3010:3010 \
              --env-file /opt/ecomed/.env \
              ecomed-app:latest

            echo "⏳ Aguardando healthcheck..."
            for i in $(seq 1 20); do
              status=$(docker inspect ecomed-web --format '{{.State.Health.Status}}' 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "✅ Container saudável"
                break
              fi
              sleep 3
            done

            echo "✅ Deploy concluído!"
            docker ps --filter name=ecomed-web
