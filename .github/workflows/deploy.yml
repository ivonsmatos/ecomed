name: Deploy EcoMed

# Dispara em cada push para master que altere código do app
on:
  push:
    branches: [master]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/**"

jobs:
  # ─── 1. Build da imagem Docker e push para GHCR ───────────────────────────
  build:
    name: Build → GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecomed:latest
            ghcr.io/${{ github.repository_owner }}/ecomed:${{ github.sha }}
          # Cache de camadas entre runs (reduz ~4min → ~1min depois do 1º build)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            AUTH_URL=${{ secrets.NEXTAUTH_URL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

  # ─── 2. Deploy no VPS: apenas pull + restart ──────────────────────────────
  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 4m
          envs: GHCR_TOKEN,GH_OWNER
          script: |
            set -e
            IMAGE="ghcr.io/${GH_OWNER}/ecomed:latest"

            echo "🔐 Login no GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_OWNER" --password-stdin

            echo "📦 Baixando imagem: $IMAGE"
            docker pull "$IMAGE"

            echo "🔄 Substituindo container ecomed-web..."
            docker stop ecomed-web 2>/dev/null || true
            docker rm   ecomed-web 2>/dev/null || true

            docker run -d \
              --name ecomed-web \
              --restart unless-stopped \
              -p 3010:3010 \
              --env-file /opt/ecomed/.env \
              "$IMAGE"

            echo "✅ Deploy concluído!"
            docker ps --filter name=ecomed-web --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
