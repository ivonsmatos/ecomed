name: Deploy EcoMed

# Dispara em cada push para master que altere código do app
on:
  push:
    branches: [master]
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Build & Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 18m
          envs: GH_TOKEN,DB_URL,AUTH_SEC,AUTH_U,GG_ID,GG_SEC,VAPID_K,SANITY_ID,SANITY_DS
          script: |
            set -e
            cd /opt/ecomed/app

            echo "📥 Atualizando código..."
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/ivonsmatos/ecomed.git"
            git fetch origin master
            git reset --hard origin/master
            git remote set-url origin "https://github.com/ivonsmatos/ecomed.git"

            echo "🔨 Build Docker (com cache de camadas)..."
            docker build \
              --build-arg "DATABASE_URL=${DB_URL}" \
              --build-arg "AUTH_SECRET=${AUTH_SEC}" \
              --build-arg "AUTH_URL=${AUTH_U}" \
              --build-arg "GOOGLE_CLIENT_ID=${GG_ID}" \
              --build-arg "GOOGLE_CLIENT_SECRET=${GG_SEC}" \
              --build-arg "NEXT_PUBLIC_VAPID_PUBLIC_KEY=${VAPID_K}" \
              --build-arg "NEXT_PUBLIC_SANITY_PROJECT_ID=${SANITY_ID}" \
              --build-arg "NEXT_PUBLIC_SANITY_DATASET=${SANITY_DS:-production}" \
              -t ecomed-app:latest .

            echo "🔄 Reiniciando container ecomed-web..."
            docker stop ecomed-web 2>/dev/null || true
            docker rm   ecomed-web 2>/dev/null || true
            docker run -d \
              --name ecomed-web \
              --restart unless-stopped \
              -p 3010:3010 \
              --env-file /opt/ecomed/.env \
              ecomed-app:latest

            echo "✅ Deploy concluído!"
            docker ps --filter name=ecomed-web --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DB_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SEC: ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_U: ${{ secrets.NEXTAUTH_URL }}
          GG_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GG_SEC: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          VAPID_K: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          SANITY_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          SANITY_DS: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
